<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Enviar Relato</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>Enviar Relato</h1>
</header>

<nav>
    <a href="index.html">Início</a>
    <a href="entrevistas.html">Entrevistas</a>
</nav>

<section>
    <form id="formDepoimento">

        <label>Nome</label>
        <input type="text" id="nome">

        <label>LinkedIn (Opcional)</label>
        <input type="url" id="linkedin">

        <label>O que você espera do mercado de TI para o futuro?</label>
        <textarea id="futuroTI"></textarea>

        <label>O que você acredita que a nova geração pode fazer (e já está fazendo) para transformar esse cenário?</label>
        <textarea id="novaGeracao"></textarea>

        <label>Na sua opinião, quais são os principais fatores que ainda contribuem para a baixa presença de mulheres na área e para situações de machismo?</label>
        <textarea id="desafiosMulheres"></textarea>

        <button type="submit">
            Compartilhar Experiência
        </button>

    </form>

</section>

<script type="module" src="js/app.js"></script>

</body>

</html>
